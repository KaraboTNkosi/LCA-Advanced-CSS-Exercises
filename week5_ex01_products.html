<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, intial-scale=1.0">
  <title>Product Cards with FlexBox and Grid</title>
  <link rel="stylesheet" href="week5_ex01_style.css">
</head>
<body>
  <header>
    <h1>Our Products</h1>
  </header>

  <main class="product-grid">
    <!-- Product Card 1 -->
     <article class="product-card">
      <img src="https://via.placeholder.com/300x200" alt="Product 1">
      <div class="product-info">
        <h3>Gloss Bomb Universal Lip Luminizer</h3>
        <p class="price">R480.00</p>
        <button class="addtocart">Add to Cart</button>
      </div>
     </article>

     <!-- Product Card  2 -->
      <article class="product-card">
        <img src="https://via.placeholder.com/300x200" alt="Product 2">
        <div class="product-info">
          <h3>Eaze Drop Lightweight Blurring Skin Tint</h3>
          <p class="price">R810.00</p>
          <button class="addtocart">Add to Cart</button>
        </div>
      </article>

    <!-- Product Card 3 -->
     <article class="product-card">
      <img src="https://via.placeholder.com/300x200" alt="Product 3">
      <div class="product-info">
        <h3>Gloss Bomb Stix High-Shine Gloss Stick</h3>
        <p class="price">R540.00</p>
        <button class="addtocart">Add to Cart</button>
      </div>
     </article>

     <!-- Product Card 4 -->
     <article class="product-card">
      <img src="https://via.placeholder.com/300x200" alt="Product 4">
      <div class="product-info">
        <h3>Allover Body Mist</h3>
        <p class="price">R730.00</p>
        <button class="addtocart">Add to Cart</button>
      </div>
     </article>

     <!-- Product Card 5 -->
     <article class="product-card">
      <img src="https://via.placeholder.com/300x200" alt="Product 5">
      <div class="product-info">
        <h3>Pro Filt'R Soft Matte Longwear Foundation</h3>
        <p class="price">R835.00</p>
        <button class="addtocart">Add to Cart</button>
      </div>
     </article>

     <!-- Product Card 6 -->
     <article class="product-card">
      <img src="https://via.placeholder.com/300x200" alt="Product 6">
      <div class="product-info">
        <h3>Match Stix Contour Skinstick</h3>
        <p class="price">R690.00</p>
        <button class="addtocart">Add to Cart</button>
      </div>
     </article>
  </main>
</body>
</html>
